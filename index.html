<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoOS Pro</title>

<style>
:root{
  --bg:#0f1115;
  --glass:rgba(255,255,255,0.08);
  --accent:#4da3ff;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  overflow:hidden;
  color:white;
}

/* LOCKSCREEN */
#lock{
  position:absolute;
  inset:0;
  backdrop-filter:blur(25px);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:10;
  transition:.8s;
}

#lock.hidden{
  opacity:0;
  pointer-events:none;
}

#time{
  font-size:60px;
}

/* HOME */
#home{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:repeat(auto-fill,80px);
  gap:20px;
  padding:40px;
  justify-content:center;
  align-content:start;
}

/* ICON */
.app{
  width:80px;
  height:80px;
  background:var(--glass);
  backdrop-filter:blur(15px);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.3s;
}

.app:hover{
  transform:scale(1.15);
}

/* APP WINDOW */
.window{
  position:absolute;
  inset:0;
  background:rgba(20,20,20,.95);
  backdrop-filter:blur(30px);
  transform:scale(.9);
  opacity:0;
  transition:.4s cubic-bezier(.2,.8,.2,1);
}

.window.active{
  transform:scale(1);
  opacity:1;
}

/* STATUS BAR */
#status{
  position:absolute;
  top:0;
  width:100%;
  height:30px;
  display:flex;
  justify-content:space-between;
  padding:0 10px;
  font-size:14px;
}

/* CONTROL CENTER */
#control{
  position:absolute;
  bottom:-100%;
  width:100%;
  height:60%;
  background:rgba(30,30,30,.95);
  backdrop-filter:blur(40px);
  border-radius:30px 30px 0 0;
  transition:.5s;
}

#control.open{
  bottom:0;
}

/* MULTITASK */
#multitask{
  position:absolute;
  inset:0;
  display:none;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(20px);
}

.card{
  width:200px;
  height:300px;
  background:#222;
  margin:20px;
  border-radius:20px;
  transform:scale(.9);
  transition:.3s;
}

.card:hover{
  transform:scale(1);
}
</style>
</head>

<body>

<div id="lock">
  <div id="time"></div>
  <small>Desliza para desbloquear</small>
</div>

<div id="status">
  <span id="clock"></span>
  <span>📶 80% 🔋</span>
</div>

<div id="home"></div>

<div id="control"></div>
<div id="multitask"></div>

<script>
// TIME SYSTEM
function updateTime(){
  const now=new Date();
  document.getElementById("time").innerText=now.toLocaleTimeString();
  document.getElementById("clock").innerText=now.toLocaleTimeString();
}
setInterval(updateTime,1000);

// UNLOCK
let startY=0;
document.getElementById("lock").addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});
document.getElementById("lock").addEventListener("touchmove",e=>{
  if(startY - e.touches[0].clientY > 80){
    document.getElementById("lock").classList.add("hidden");
  }
});

// APPS SYSTEM
const apps=["Navegador","Galería","Ajustes","Música"];

const home=document.getElementById("home");

apps.forEach(name=>{
  const el=document.createElement("div");
  el.className="app";
  el.innerText=name[0];

  el.onclick=()=>openApp(name);

  home.appendChild(el);
});

// OPEN APP
function openApp(name){
  let win=document.createElement("div");
  win.className="window active";
  win.innerHTML=`<h1>${name}</h1>`;
  document.body.appendChild(win);

  activeApps.push(win);
}

// MULTITASK
let activeApps=[];

document.body.addEventListener("keydown",e=>{
  if(e.key==="m"){
    multitask();
  }
});

function multitask(){
  const layer=document.getElementById("multitask");
  layer.innerHTML="";
  layer.style.display="flex";

  activeApps.forEach(app=>{
    const card=document.createElement("div");
    card.className="card";
    card.onclick=()=>{
      app.remove();
      layer.style.display="none";
    }
    layer.appendChild(card);
  });
}

// CONTROL CENTER
let control=document.getElementById("control");

document.body.addEventListener("touchstart",e=>{
  if(e.touches[0].clientY < 20){
    control.classList.add("open");
  }
});

document.body.addEventListener("touchmove",e=>{
  if(e.touches[0].clientY > 200){
    control.classList.remove("open");
  }
});

// PERFORMANCE MODE
let heavy=true;

function togglePerformance(){
  heavy=!heavy;
  document.body.style.filter= heavy ? "none":"brightness(0.8)";
}

// RAF LOOP (ANIMACIONES)
function loop(){
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
