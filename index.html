<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyRom OS</title>

<style>

:root{
--glass:rgba(255,255,255,.1);
--blur:blur(30px);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(150deg,#0f172a,#020617);
color:white;
}

/* STATUS BAR */

.status{
position:absolute;
top:0;
width:100%;
height:35px;
display:flex;
justify-content:space-between;
padding:0 15px;
align-items:center;
font-size:14px;
}

/* DYNAMIC ISLAND */

.island{
position:absolute;
top:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:28px;
background:black;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
transition:.35s cubic-bezier(.2,.9,.3,1);
}

.island.active{
width:260px;
height:55px;
}

/* GRID ORIGINOS */

.grid{
position:absolute;
top:60px;
width:100%;
display:grid;
grid-template-columns:repeat(4,1fr);
grid-auto-rows:90px;
gap:12px;
padding:10px 20px;
}

.tile{
background:var(--glass);
backdrop-filter:var(--blur);
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
transition:transform .3s cubic-bezier(.2,.9,.3,1),box-shadow .3s;
cursor:pointer;
}

.tile:hover{
transform:scale(1.05);
box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.widget-large{
grid-column:span 2;
grid-row:span 2;
font-size:38px;
}

/* DOCK */

.dock{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:85%;
height:80px;
background:var(--glass);
backdrop-filter:var(--blur);
border-radius:30px;
display:flex;
justify-content:space-around;
align-items:center;
}

/* APPS */

.app{
position:absolute;
top:50%;
left:50%;
width:88%;
height:82%;
background:var(--glass);
backdrop-filter:blur(40px);
border-radius:30px;
transform:translate(-50%,-50%) scale(.8);
opacity:0;
transition:.35s cubic-bezier(.2,.9,.3,1);
}

.app.active{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

/* NOTIFICATION */

.notification{
position:absolute;
top:-120px;
left:50%;
transform:translateX(-50%);
background:black;
padding:15px 25px;
border-radius:20px;
transition:.4s;
}

.notification.show{
top:50px;
}

/* WIDGET */

.widget{
cursor:grab;
}

/* CHAT */

.chat{
height:75%;
overflow:auto;
padding:10px;
}

.msg{
background:#1e293b;
margin:5px;
padding:8px;
border-radius:10px;
}

/* GESTURE */

.gesture{
position:absolute;
bottom:5px;
width:100%;
display:flex;
justify-content:center;
}

.bar{
width:120px;
height:6px;
background:white;
border-radius:10px;
opacity:.5;
}

</style>

</head>

<body>

<div class="status">
<div id="time"></div>
<div>📶 📡 🔋</div>
</div>

<div class="island" id="island">SkyRom</div>

<div class="notification" id="noti">Notificación</div>

<!-- GRID -->

<div class="grid">

<div class="tile widget-large widget">
<div id="clock"></div>
</div>

<div class="tile" onclick="openApp('ai')">🤖</div>
<div class="tile" onclick="openApp('store')">🛍</div>
<div class="tile">📷</div>
<div class="tile">🎵</div>
<div class="tile">🌐</div>

</div>

<!-- DOCK -->

<div class="dock">
<div class="tile">📞</div>
<div class="tile">💬</div>
<div class="tile">⚙️</div>
</div>

<!-- AI APP -->

<div class="app" id="ai">

<div style="padding:10px;font-weight:bold">SkyAI</div>

<div class="chat" id="chat"></div>

<input id="input" style="width:70%">
<button onclick="send()">Enviar</button>

</div>

<!-- STORE -->

<div class="app" id="store">

<div style="padding:10px;font-weight:bold">SkyStore</div>

<button onclick="install('🎮')">instalar juego</button> <button onclick="install('📷')">instalar cámara</button>

</div>

<div class="gesture" onclick="home()">
<div class="bar"></div>
</div>

<script>

/* CLOCK */

function clock(){

let d=new Date()

let t=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")

document.getElementById("clock").innerText=t
document.getElementById("time").innerText=t

}

setInterval(clock,1000)
clock()

/* APPS */

function openApp(id){

document.querySelectorAll(".app").forEach(a=>a.classList.remove("active"))

document.getElementById(id).classList.add("active")

island("App abierta")

}

/* HOME */

function home(){

document.querySelectorAll(".app").forEach(a=>a.classList.remove("active"))

}

/* ISLAND */

function island(text){

let i=document.getElementById("island")

i.innerText=text

i.classList.add("active")

setTimeout(()=>{
i.classList.remove("active")
i.innerText="SkyRom"
},2000)

}

/* NOTIFICATION */

function notify(text){

let n=document.getElementById("noti")

n.innerText=text

n.classList.add("show")

setTimeout(()=>n.classList.remove("show"),3000)

}

/* AI */

function send(){

let input=document.getElementById("input")
let chat=document.getElementById("chat")

let user=document.createElement("div")
user.className="msg"
user.innerText=input.value
chat.appendChild(user)

let ai=document.createElement("div")
ai.className="msg"

if(input.value.includes("hola")){
ai.innerText="hola 👋"
}
else if(input.value.includes("hora")){
ai.innerText=new Date().toLocaleTimeString()
}
else{
ai.innerText="estoy aprendiendo"
}

chat.appendChild(ai)

input.value=""

}

/* INSTALL */

function install(icon){

let grid=document.querySelector(".grid")

let app=document.createElement("div")

app.className="tile"

app.innerText=icon

grid.appendChild(app)

notify("app instalada")

}

</script>

</body>
</html>
