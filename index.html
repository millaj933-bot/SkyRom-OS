<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyOS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* SKYOS CORE SYSTEM         */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:black;
height:100vh;
overflow:hidden;
}

/* ========================= */
/* WALLPAPER                 */
/* ========================= */

.wallpaper{
position:absolute;
width:100%;
height:100%;
background:url("https://picsum.photos/1200/2000") center/cover;
filter:grayscale(100%);
}

.blur{
position:absolute;
width:100%;
height:100%;
backdrop-filter:blur(40px);
}

/* ========================= */
/* STATUS BAR                */
/* ========================= */

.statusBar{
position:absolute;
top:0;
width:100%;
height:40px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
color:white;
font-size:14px;
}

/* ========================= */
/* DYNAMIC ISLAND            */
/* ========================= */

.island{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:110px;
height:30px;
background:black;
border-radius:20px;
transition:.4s;
}

.island.active{
width:260px;
height:90px;
}

/* ========================= */
/* APP GRID                  */
/* ========================= */

.apps{
position:absolute;
top:90px;
width:100%;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:30px;
}

.app{
width:70px;
height:70px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(20px);
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
color:white;
cursor:pointer;
transition:.3s;
}

.app:hover{
transform:scale(1.1);
}

/* ========================= */
/* DOCK                      */
/* ========================= */

.dock{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:85%;
height:70px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(40px);
border-radius:25px;
display:flex;
justify-content:space-around;
align-items:center;
}

/* ========================= */
/* WINDOWS                   */
/* ========================= */

.window{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
flex-direction:column;
color:white;
animation:open .4s;
}

@keyframes open{
0%{transform:scale(.8);opacity:0}
100%{transform:scale(1);opacity:1}
}

.topbar{
height:50px;
display:flex;
align-items:center;
padding:0 15px;
background:#111;
}

.close{
margin-left:auto;
cursor:pointer;
}

/* ========================= */
/* WIDGETS                   */
/* ========================= */

.widget{
position:absolute;
width:160px;
height:120px;
background:rgba(255,255,255,.1);
border-radius:20px;
backdrop-filter:blur(30px);
padding:10px;
color:white;
}

.widgetClock{top:150px;left:20px}
.widgetWeather{top:150px;right:20px}
.widgetBattery{bottom:150px;left:20px}
.widgetMusic{bottom:150px;right:20px}

/* ========================= */
/* NOTIFICATIONS             */
/* ========================= */

.notification{
position:absolute;
top:-120px;
left:50%;
transform:translateX(-50%);
background:rgba(30,30,30,.9);
color:white;
padding:15px 25px;
border-radius:15px;
transition:.5s;
}

.notification.show{
top:60px;
}

/* ========================= */
/* ANIMATIONS                */
/* ========================= */

@keyframes skySlideUp{
0%{transform:translateY(100px);opacity:0}
100%{transform:translateY(0);opacity:1}
}

@keyframes skyFade{
0%{opacity:0}
100%{opacity:1}
}

@keyframes islandPulse{
0%{width:110px}
50%{width:260px}
100%{width:110px}
}

</style>

</head>

<body>

<div class="wallpaper"></div>
<div class="blur"></div>

<div class="statusBar">
<div id="time">12:00</div>
<div>📶 🔋</div>
</div>

<div class="island" id="island"></div>

<div class="notification" id="notif">Nueva notificación</div>

<!-- APPS -->

<div class="apps">

<div class="app" onclick="openApp('calc')">Calc</div>
<div class="app" onclick="openApp('gallery')">Fotos</div>
<div class="app" onclick="openApp('camera')">Cam</div>
<div class="app" onclick="openApp('ai')">AI</div>

</div>

<!-- DOCK -->

<div class="dock">
<div class="app">Tel</div>
<div class="app">Msg</div>
<div class="app">Web</div>
<div class="app">Mus</div>
</div>

<!-- WIDGETS -->

<div class="widget widgetClock" id="clockWidget">
Hora
</div>

<div class="widget widgetWeather">
Clima
</div>

<div class="widget widgetBattery">
Batería
</div>

<div class="widget widgetMusic">
Música
</div>

<!-- CALCULATOR -->

<div class="window" id="calc">

<div class="topbar">
Calculadora
<div class="close" onclick="closeApp('calc')">✕</div>
</div>

<div style="padding:30px;font-size:30px">
2 + 2 = 4
</div>

</div>

<!-- GALLERY -->

<div class="window" id="gallery">

<div class="topbar">
Galería
<div class="close" onclick="closeApp('gallery')">✕</div>
</div>

<div style="padding:20px">
<img src="https://picsum.photos/300" width="100%">
</div>

</div>

<!-- CAMERA -->

<div class="window" id="camera">

<div class="topbar">
Cámara
<div class="close" onclick="closeApp('camera')">✕</div>
</div>

<div style="padding:30px">
📷 Cámara simulada
</div>

</div>

<!-- AI -->

<div class="window" id="ai">

<div class="topbar">
SkyAI
<div class="close" onclick="closeApp('ai')">✕</div>
</div>

<div style="padding:20px">

<input id="msg">
<button onclick="send()">Enviar</button>

<div id="chat"></div>

</div>

</div>

<script>

/* ========================= */
/* SYSTEM FUNCTIONS          */
/* ========================= */

function openApp(id){
document.getElementById(id).style.display="flex"
}

function closeApp(id){
document.getElementById(id).style.display="none"
}

/* ========================= */
/* CLOCK                     */
/* ========================= */

setInterval(()=>{
let d=new Date()
document.getElementById("time").innerText=
d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")
},1000)

/* ========================= */
/* NOTIFICATION              */
/* ========================= */

setTimeout(()=>{
document.getElementById("notif").classList.add("show")
},2000)

/* ========================= */
/* DYNAMIC ISLAND            */
/* ========================= */

setInterval(()=>{
let island=document.getElementById("island")
island.classList.toggle("active")
setTimeout(()=>island.classList.remove("active"),2000)
},8000)

/* ========================= */
/* SKYAI                     */
/* ========================= */

function send(){

let input=document.getElementById("msg")
let chat=document.getElementById("chat")

let q=input.value

chat.innerHTML+="<div>> "+q+"</div>"

let r="SkyAI: soy la IA del sistema."

if(q.toLowerCase().includes("hola")){
r="SkyAI: hola 👋"
}

if(q.toLowerCase().includes("skyos")){
r="SkyAI: SkyOS es tu sistema operativo web."
}

chat.innerHTML+="<div>"+r+"</div>"

input.value=""

}

/* ========================= */
/* HAPTIC SIMULATION         */
/* ========================= */

function vibrate(){
document.body.style.transform="translateX(3px)"
setTimeout(()=>{document.body.style.transform="translateX(-3px)"},50)
setTimeout(()=>{document.body.style.transform="translateX(0)"},100)
}

</script>

</body>
</html>
