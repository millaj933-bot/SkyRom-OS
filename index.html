<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PhantomOS v3</title>

<style>

:root{
--bg:#020617;
--glass:rgba(255,255,255,.08);
--text:white;
}

.light{
--bg:#f1f5f9;
--glass:rgba(0,0,0,.08);
--text:black;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
height:100vh;
overflow:hidden;
background:var(--bg);
color:var(--text);
transition:.4s;
}

/* boot */

.boot{
position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
z-index:100;
animation:boot 2.5s forwards;
}

@keyframes boot{
0%{opacity:1}
90%{opacity:1}
100%{opacity:0;pointer-events:none}
}

/* dynamic island */

.island{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
width:120px;
height:35px;
background:black;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
color:white;
transition:.4s cubic-bezier(.2,.9,.3,1);
}

.island.active{
width:260px;
height:60px;
}

/* notification */

.notification{
position:absolute;
top:-100px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.8);
padding:15px 25px;
border-radius:20px;
transition:.5s;
color:white;
}

.notification.show{
top:70px;
}

/* widgets */

.widgets{
position:absolute;
top:80px;
left:20px;
}

.widget{
background:var(--glass);
backdrop-filter:blur(25px);
padding:20px;
border-radius:20px;
margin-bottom:15px;
width:160px;
}

/* launcher */

.desktop{
position:absolute;
top:80px;
width:100%;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
padding:30px;
}

.icon{
width:70px;
height:70px;
border-radius:18px;
background:linear-gradient(145deg,#3b82f6,#2563eb);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
transition:.3s;
}

.icon:hover{
transform:scale(1.15) translateY(-5px);
}

/* apps */

.app{
position:absolute;
top:50%;
left:50%;
width:85%;
height:80%;
background:var(--glass);
backdrop-filter:blur(35px);
border-radius:30px;
transform:translate(-50%,-50%) scale(.6);
opacity:0;
transition:.4s cubic-bezier(.2,.9,.3,1);
}

.app.active{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

.topbar{
height:45px;
display:flex;
align-items:center;
padding-left:20px;
background:rgba(0,0,0,.1);
border-radius:30px 30px 0 0;
}

/* gesture */

.gesture{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:center;
}

.bar{
width:120px;
height:6px;
background:white;
border-radius:10px;
opacity:.5;
}

button{
padding:10px;
margin:5px;
}

</style>
</head>

<body>

<div class="boot">PhantomOS</div>

<div class="island" id="island">
<span id="islandtext">PhantomOS</span>
</div>

<div class="notification" id="noti">Notificación</div>

<div class="widgets">

<div class="widget">
<div id="clock"></div>
</div>

</div>

<div class="desktop">

<div class="icon" onclick="openApp('calc')">🧮</div>
<div class="icon" onclick="openApp('camera')">📷</div>
<div class="icon" onclick="openApp('gallery')">🖼</div>
<div class="icon" onclick="toggleTheme()">🌗</div>

</div>

<!-- calculadora -->

<div class="app" id="calc">

<div class="topbar">Calculadora</div>

<div style="padding:20px">

<input id="display" style="width:100%;height:40px;font-size:20px">

<br>

<button onclick="calc('1')">1</button>
<button onclick="calc('2')">2</button>
<button onclick="calc('3')">3</button>

<button onclick="calc('+')">+</button>

<br>

<button onclick="calc('4')">4</button>
<button onclick="calc('5')">5</button>
<button onclick="calc('6')">6</button>

<button onclick="calc('-')">-</button>

<br>

<button onclick="calc('7')">7</button>
<button onclick="calc('8')">8</button>
<button onclick="calc('9')">9</button>

<button onclick="result()">=</button>

</div>

</div>

<!-- camara -->

<div class="app" id="camera">

<div class="topbar">Cámara</div>

<div style="padding:20px">

<video id="video" width="100%" autoplay></video>

<button onclick="startCamera()">encender cámara</button>

</div>

</div>

<!-- galeria -->

<div class="app" id="gallery">

<div class="topbar">Galería</div>

<div style="padding:20px">

<input type="file" accept="image/*" onchange="loadImage(event)">

<img id="img" style="width:100%;margin-top:10px">

</div>

</div>

<div class="gesture" onclick="home()">
<div class="bar"></div>
</div>

<script>

/* reloj widget */

function clock(){
let d=new Date()
document.getElementById("clock").innerText=
d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")
}
setInterval(clock,1000)
clock()

/* dynamic island */

function island(text){

let i=document.getElementById("island")
let t=document.getElementById("islandtext")

t.innerText=text

i.classList.add("active")

setTimeout(()=>{
i.classList.remove("active")
t.innerText="PhantomOS"
},2500)

}

/* notificaciones */

function notify(text){

let n=document.getElementById("noti")

n.innerText=text

n.classList.add("show")

setTimeout(()=>{
n.classList.remove("show")
},3000)

}

/* apps */

function openApp(id){

document.querySelectorAll(".app").forEach(a=>{
a.classList.remove("active")
})

document.getElementById(id).classList.add("active")

island("App abierta")

vibrate()

}

/* home */

function home(){

document.querySelectorAll(".app").forEach(a=>{
a.classList.remove("active")
})

}

/* vibración */

function vibrate(){
if(navigator.vibrate){
navigator.vibrate(40)
}
}

/* tema */

function toggleTheme(){
document.body.classList.toggle("light")
notify("Tema cambiado")
}

/* calculadora */

function calc(n){
document.getElementById("display").value+=n
}

function result(){
let d=document.getElementById("display")
d.value=eval(d.value)
}

/* camara */

function startCamera(){

navigator.mediaDevices.getUserMedia({video:true})

.then(stream=>{
document.getElementById("video").srcObject=stream
})

}

/* galeria */

function loadImage(e){

let img=document.getElementById("img")

img.src=URL.createObjectURL(e.target.files[0])

}

</script>

</body>
</html>
