<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ColorOS Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --coloros-green: #00B578;
            --coloros-blue: #2196F3;
            --coloros-orange: #FF9800;
            --bg-light: #F5FBF6;
            --bg-dark: #191C1A;
            --glass-light: rgba(255, 255, 255, 0.25);
            --glass-dark: rgba(28, 28, 30, 0.7);
            --glass-border-light: rgba(255, 255, 255, 0.3);
            --glass-border-dark: rgba(255, 255, 255, 0.1);
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            width: 100vw;
        }

        /* LOCK SCREEN */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #lockScreen.unlocked {
            opacity: 0;
            transform: translateY(-100%);
            pointer-events: none;
        }

        .lock-time {
            font-size: 80px;
            font-weight: 200;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .lock-date {
            font-size: 18px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 60px;
        }

        .fingerprint-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .fingerprint-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--coloros-green), #00d68f);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 181, 120, 0.4);
            position: relative;
            z-index: 10;
            transition: transform 0.2s;
        }

        .fingerprint-btn:active {
            transform: scale(0.95);
        }

        .fingerprint-btn.scanning {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(0, 181, 120, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 12px 40px rgba(0, 181, 120, 0.6); }
        }

        .fingerprint-icon {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .scan-ring {
            position: absolute;
            border: 2px solid var(--coloros-green);
            border-radius: 50%;
            opacity: 0;
        }

        .scanning .scan-ring {
            animation: scan 1.5s infinite;
        }

        .scan-ring:nth-child(2) { animation-delay: 0.3s; }
        .scan-ring:nth-child(3) { animation-delay: 0.6s; }

        @keyframes scan {
            0% { width: 80px; height: 80px; opacity: 0.6; }
            100% { width: 140px; height: 140px; opacity: 0; }
        }

        .unlock-text {
            margin-top: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        /* HOME SCREEN */
        #homeScreen {
            width: 100%;
            height: 100%;
            padding: 50px 20px 100px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
        }

        .time-display {
            font-size: 16px;
        }

        .status-icons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .widget-container {
            margin-bottom: 30px;
        }

        .weather-widget {
            background: var(--glass-dark);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border-dark);
            border-radius: 24px;
            padding: 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .weather-widget::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .weather-temp {
            font-size: 48px;
            font-weight: 300;
        }

        .weather-desc {
            opacity: 0.8;
            margin-top: 5px;
        }

        /* APP GRID */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .app-item.dragging {
            z-index: 1000;
            transform: scale(1.1);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: var(--glass-dark);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .app-item:active .app-icon {
            transform: scale(0.9);
        }

        .app-name {
            color: white;
            font-size: 11px;
            text-align: center;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* DOCK */
        .dock {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 80px;
            background: var(--glass-dark);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border-dark);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            z-index: 99;
        }

        .dock-item {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .dock-item:active {
            transform: scale(0.9);
        }

        .dock-item.primary {
            background: linear-gradient(135deg, var(--coloros-green), #00d68f);
            box-shadow: 0 4px 15px rgba(0, 181, 120, 0.4);
        }

        /* APP LAUNCH ANIMATION */
        .app-launch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .app-launch-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .launch-icon {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: var(--coloros-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* SETTINGS PANEL */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100%;
            background: var(--glass-dark);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 200;
            transition: right 0.3s ease;
            padding: 60px 20px 20px;
            overflow-y: auto;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-header {
            color: white;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .setting-item {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .toggle {
            width: 50px;
            height: 28px;
            background: rgba(255,255,255,0.3);
            border-radius: 14px;
            position: relative;
            transition: background 0.3s;
        }

        .toggle.active {
            background: var(--coloros-green);
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle.active::after {
            transform: translateX(22px);
        }

        .close-settings {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* PARALLEL ANIMATION ELEMENTS */
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: float 10s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* ADD APP MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--glass-dark);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border-dark);
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            color: white;
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .app-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .app-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .app-option:hover {
            background: rgba(255,255,255,0.1);
        }

        .app-option-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--coloros-blue), #64b5f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .app-option-name {
            font-size: 10px;
            text-align: center;
        }

        .close-modal {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        /* FULLSCREEN MODE */
        body.fullscreen .status-bar,
        body.fullscreen .dock {
            opacity: 0;
            pointer-events: none;
        }

        /* ACTION BUTTON STYLES */
        .action-button {
            position: fixed;
            bottom: 120px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--coloros-orange), #ffb74d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 152, 0, 0.4);
            z-index: 98;
            transition: transform 0.3s;
        }

        .action-button:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <!-- PARTICLES BACKGROUND -->
    <div class="floating-particles" id="particles"></div>

    <!-- LOCK SCREEN -->
    <div id="lockScreen">
        <div class="lock-time" id="lockTime">12:00</div>
        <div class="lock-date" id="lockDate">Lunes, 1 de Enero</div>
        
        <div class="fingerprint-container" id="fingerprintBtn">
            <div class="scan-ring"></div>
            <div class="scan-ring"></div>
            <div class="scan-ring"></div>
            <div class="fingerprint-btn">
                <svg class="fingerprint-icon" viewBox="0 0 24 24">

                </svg>
            </div>
        </div>
        
        <div class="unlock-text">Toca para desbloquear</div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <div class="time-display" id="statusTime">12:00</div>
        <div class="status-icons">
            <span>📶</span>
            <span>📡</span>
            <span>🔋</span>
        </div>
    </div>

    <!-- HOME SCREEN -->
    <div id="homeScreen">
        <!-- WEATHER WIDGET -->
        <div class="widget-container">
            <div class="weather-widget">
                <div class="weather-temp">24°</div>
                <div class="weather-desc">Parcialmente nublado • Máx: 28°</div>
            </div>
        </div>

        <!-- APP GRID -->
        <div class="app-grid" id="appGrid">
            <!-- Apps will be generated by JavaScript -->
        </div>
    </div>

    <!-- DOCK -->
    <div class="dock">
        <div class="dock-item" onclick="openSearch()">🔍</div>
        <div class="dock-item primary" onclick="toggleSettings()">⚙️</div>
        <div class="dock-item" onclick="openAddApp()">➕</div>
    </div>

    <!-- ACTION BUTTON -->
    <div class="action-button" onclick="toggleFullscreen()">⛶</div>

    <!-- APP LAUNCH OVERLAY -->
    <div class="app-launch-overlay" id="launchOverlay">
        <div class="launch-icon" id="launchIcon">📱</div>
    </div>

    <!-- SETTINGS PANEL -->
    <div class="settings-panel" id="settingsPanel">
        <div class="close-settings" onclick="toggleSettings()">✕</div>
        <div class="settings-header">Configuración</div>
        
        <div class="setting-item" onclick="toggleFullscreen()">
            <span>Modo Pantalla Completa</span>
            <div class="toggle" id="fullscreenToggle"></div>
        </div>
        
        <div class="setting-item" onclick="toggleTheme()">
            <span>Tema Oscuro</span>
            <div class="toggle" id="themeToggle"></div>
        </div>
        
        <div class="setting-item">
            <span>Animaciones Fluidas</span>
            <div class="toggle active"></div>
        </div>
        
        <div class="setting-item">
            <span>Efecto Liquid Glass</span>
            <div class="toggle active"></div>
        </div>
        
        <div class="setting-item" onclick="lockDevice()">
            <span>Bloquear Dispositivo</span>
            <span>🔒</span>
        </div>
    </div>

    <!-- ADD APP MODAL -->
    <div class="modal" id="addAppModal">
        <div class="modal-content">
            <div class="modal-title">Agregar Aplicación</div>
            <div class="app-list" id="appList">
                <!-- Generated by JS -->
            </div>
            <button class="close-modal" onclick="closeAddApp()">Cerrar</button>
        </div>
    </div>

    <script>
        // APPS DATA
        let apps = [
            { id: 1, name: 'Teléfono', icon: '📞', color: '#00B578' },
            { id: 2, name: 'Mensajes', icon: '💬', color: '#2196F3' },
            { id: 3, name: 'Cámara', icon: '📷', color: '#FF5722' },
            { id: 4, name: 'Fotos', icon: '🖼️', color: '#E91E63' },
            { id: 5, name: 'Config', icon: '⚙️', color: '#607D8B' },
            { id: 6, name: 'Música', icon: '🎵', color: '#9C27B0' },
            { id: 7, name: 'Reloj', icon: '⏰', color: '#FF9800' },
            { id: 8, name: 'Clima', icon: '🌤️', color: '#03A9F4' },
            { id: 9, name: 'Maps', icon: '🗺️', color: '#4CAF50' },
            { id: 10, name: 'Mail', icon: '📧', color: '#F44336' },
            { id: 11, name: 'Calc', icon: '🧮', color: '#795548' },
            { id: 12, name: 'Notas', icon: '📝', color: '#FFEB3B' }
        ];

        let availableApps = [
            { name: 'Netflix', icon: '🎬', color: '#E50914' },
            { name: 'Spotify', icon: '🎧', color: '#1DB954' },
            { name: 'YouTube', icon: '▶️', color: '#FF0000' },
            { name: 'WhatsApp', icon: '💚', color: '#25D366' },
            { name: 'Instagram', icon: '📸', color: '#E4405F' },
            { name: 'Twitter', icon: '🐦', color: '#1DA1F2' },
            { name: 'Facebook', icon: '👤', color: '#1877F2' },
            { name: 'TikTok', icon: '🎵', color: '#000000' }
        ];

        let draggedItem = null;
        let draggedIndex = null;

        // INITIALIZE
        document.addEventListener('DOMContentLoaded', () => {
            updateTime();
            setInterval(updateTime, 1000);
            renderApps();
            renderParticles();
            setupFingerprint();
        });

        // TIME UPDATE
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeStr = `${hours}:${minutes}`;
            
            document.getElementById('lockTime').textContent = timeStr;
            document.getElementById('statusTime').textContent = timeStr;
            
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('lockDate').textContent = now.toLocaleDateString('es-ES', options);
        }

        // FINGERPRINT
        function setupFingerprint() {
            const btn = document.getElementById('fingerprintBtn');
            btn.addEventListener('click', () => {
                btn.classList.add('scanning');
                setTimeout(() => {
                    unlockDevice();
                }, 1500);
            });
        }

        function unlockDevice() {
            document.getElementById('lockScreen').classList.add('unlocked');
        }

        function lockDevice() {
            document.getElementById('lockScreen').classList.remove('unlocked');
            document.getElementById('fingerprintBtn').classList.remove('scanning');
            toggleSettings();
        }

        // RENDER APPS
        function renderApps() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = '';
            
            apps.forEach((app, index) => {
                const item = document.createElement('div');
                item.className = 'app-item';
                item.draggable = true;
                item.dataset.index = index;
                item.innerHTML = `
                    <div class="app-icon" style="background: linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, 20)})">
                        ${app.icon}
                    </div>
                    <div class="app-name">${app.name}</div>
                `;
                
                // Drag events
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDrop);
                item.addEventListener('dragend', handleDragEnd);
                
                // Click to launch
                item.addEventListener('click', () => launchApp(app));
                
                grid.appendChild(item);
            });
        }

        // DRAG AND DROP
        function handleDragStart(e) {
            draggedItem = this;
            draggedIndex = parseInt(this.dataset.index);
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDrop(e) {
            e.preventDefault();
            if (this === draggedItem) return;
            
            const dropIndex = parseInt(this.dataset.index);
            const temp = apps[draggedIndex];
            apps.splice(draggedIndex, 1);
            apps.splice(dropIndex, 0, temp);
            
            renderApps();
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            draggedItem = null;
            draggedIndex = null;
        }

        // APP LAUNCH ANIMATION
        function launchApp(app) {
            const overlay = document.getElementById('launchOverlay');
            const icon = document.getElementById('launchIcon');
            
            icon.textContent = app.icon;
            icon.style.background = app.color;
            overlay.classList.add('active');
            
            // Parallel animation
            icon.style.top = '50%';
            icon.style.left = '50%';
            icon.style.transform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(() => {
                icon.style.transform = 'translate(-50%, -50%) scale(20)';
                icon.style.opacity = '0';
            }, 100);
            
            setTimeout(() => {
                overlay.classList.remove('active');
                icon.style.transform = 'translate(-50%, -50%) scale(1)';
                icon.style.opacity = '1';
                alert(`Abriendo ${app.name}...`);
            }, 600);
        }

        // SETTINGS
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function toggleFullscreen() {
            document.body.classList.toggle('fullscreen');
            document.getElementById('fullscreenToggle').classList.toggle('active');
        }

        function toggleTheme() {
            document.getElementById('themeToggle').classList.toggle('active');
        }

        // ADD APP
        function openAddApp() {
            const list = document.getElementById('appList');
            list.innerHTML = '';
            
            availableApps.forEach(app => {
                const div = document.createElement('div');
                div.className = 'app-option';
                div.innerHTML = `
                    <div class="app-option-icon" style="background: ${app.color}">${app.icon}</div>
                    <div class="app-option-name">${app.name}</div>
                `;
                div.onclick = () => addApp(app);
                list.appendChild(div);
            });
            
            document.getElementById('addAppModal').classList.add('show');
        }

        function closeAddApp() {
            document.getElementById('addAppModal').classList.remove('show');
        }

        function addApp(app) {
            const newApp = {
                id: Date.now(),
                name: app.name,
                icon: app.icon,
                color: app.color
            };
            apps.push(newApp);
            renderApps();
            closeAddApp();
        }

        // SEARCH
        function openSearch() {
            const query = prompt('Buscar aplicaciones:');
            if (query) {
                const found = apps.filter(a => a.name.toLowerCase().includes(query.toLowerCase()));
                if (found.length > 0) {
                    alert(`Encontrado: ${found.map(a => a.name).join(', ')}`);
                } else {
                    alert('No se encontraron aplicaciones');
                }
            }
        }

        // PARTICLES
        function renderParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }

        // COLOR UTILS
        function adjustColor(color, amount) {
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return `#${(0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1)}`;
        }

        // Touch support for mobile
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', e => {
            if (!touchStartX || !touchStartY) return;
            const touchEndX = e.touches[0].clientX;
            const touchEndY = e.touches[0].clientY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    // Swipe left - open settings
                    document.getElementById('settingsPanel').classList.add('open');
                } else {
                    // Swipe right - close settings
                    document.getElementById('settingsPanel').classList.remove('open');
                }
            }
            touchStartX = null;
            touchStartY = null;
        });
    </script>

function selectDevice(device) {
    currentDevice = device;
    document.getElementById('btn-android').style.borderColor = device === 'android' ? '#00B578' : 'rgba(255,255,255,0.3)';
    document.getElementById('btn-ios').style.borderColor = device === 'ios' ? '#00B578' : 'rgba(255,255,255,0.3)';
}

function selectLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.querySelector('#setupScreen h3').textContent = t.selectDevice;
    document.querySelectorAll('#setupScreen h3')[1].textContent = t.selectLang;
    document.querySelector('#setupScreen button:last-child').textContent = t.continue;
}

function finishSetup() {
    const setup = document.getElementById('setupScreen');
    setup.style.opacity = '0';
    setup.style.transition = 'opacity 0.5s';
    setTimeout(() => setup.remove(), 500);
    applyLanguage();
    renderApps();
}

function applyLanguage() {
    const t = translations[currentLang];
    document.querySelector('.unlock-text').textContent = t.unlock;
    document.querySelector('.settings-header').textContent = t.settings;
    document.querySelectorAll('.setting-item')[0].querySelector('span').textContent = t.fullscreen;
    document.querySelectorAll('.setting-item')[1].querySelector('span').textContent = t.dark;
    document.querySelectorAll('.setting-item')[2].querySelector('span').textContent = t.fluid;
    document.querySelectorAll('.setting-item')[3].querySelector('span').textContent = t.glass;
    document.querySelectorAll('.setting-item')[4].querySelector('span').textContent = t.lock;
    document.querySelector('.modal-title').textContent = t.addApp;
    document.querySelector('.close-modal').textContent = t.close;
}

// Override renderApps with SVG support
function renderApps() {
    const grid = document.getElementById('appGrid');
    grid.innerHTML = '';
    
    apps.forEach((app, index) => {
        const item = document.createElement('div');
        item.className = 'app-item';
        item.draggable = true;
        item.dataset.index = index;
        item.innerHTML = `
            <div class="app-icon" style="background: linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, 20)})">
                ${app.icon}
            </div>
            <div class="app-name">${app.name}</div>
        `;
        
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);
        item.addEventListener('click', () => launchApp(app));
        
        grid.appendChild(item);
    });
}

// Override openSearch
function openSearch() {
    const t = translations[currentLang];
    const query = prompt(t.search + ':');
    if (query) {
        const found = apps.filter(a => a.name.toLowerCase().includes(query.toLowerCase()));
        if (found.length > 0) {
            launchApp(found[0]);
        }
    }
}

// Initialize setup on load
window.addEventListener('load', () => {
    setTimeout(showSetup, 500);
});

        statusBar.style.cssText = 'position: absolute; top: 0; left: 0; right: 0; height: 45px; padding: 12px 20px 0; z-index: 100;';
    }
    
    if (homeScreen) {
        homeScreen.style.cssText = 'position: absolute; top: 45px; left: 0; right: 0; bottom: 90px; padding: 20px; overflow-y: auto;';
    }
    
    if (dock) {
        dock.style.cssText = 'position: absolute; bottom: 35px; left: 15px; right: 15px; height: 70px; z-index: 99;';
    }
    
    renderApps();
    setupGestureBar();
}

function initPCMode() {
    const pcAppGrid = document.getElementById('pcAppGrid');
    const pcDock = document.getElementById('pcDock');
    
    // Render PC apps
    apps.forEach(app => {
        const div = document.createElement('div');
        div.className = 'pc-icon';
        div.style.background = `linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, 20)})`;
        div.innerHTML = app.icon;
        div.title = app.name;
        div.onclick = () => launchAppPC(app);
        pcAppGrid.appendChild(div);
    });
    
    // PC Dock
    const dockApps = apps.slice(0, 4);
    dockApps.forEach(app => {
        const div = document.createElement('div');
        div.className = 'pc-icon';
        div.style.background = `linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, 20)})`;
        div.innerHTML = app.icon;
        div.onclick = () => launchAppPC(app);
        pcDock.appendChild(div);
    });
}

function launchAppPC(app) {
    const overlay = document.getElementById('launchOverlay');
    document.getElementById('launchIconLarge').innerHTML = app.icon;
    document.getElementById('launchIconLarge').style.background = `linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, 20)})`;
    document.getElementById('launchName').textContent = app.name;
    
    overlay.classList.add('active');
    
    setTimeout(() => {
        overlay.classList.remove('active');
    }, 1500);
}

function launchApp(app) {
    const overlay = document.getElementById('launchOverlay');
    document.getElementById('launchIconLarge').innerHTML = app.icon;
    document.getElementById('launchIconLarge').style.background = `linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, 20)})`;
    document.getElementById('launchName').textContent = app.name;
    
    overlay.classList.add('active');
    
    setTimeout(() => {
        overlay.classList.remove('active');
    }, 2000);
}

function setupGestureBar() {
    const bar = document.getElementById('gestureBar');
    let startY = 0;
    
    bar.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        bar.style.transform = 'translateX(-50%) scaleX(1.3)';
    }, {passive: true});
    
    bar.addEventListener('touchend', (e) => {
        const endY = e.changedTouches[0].clientY;
        bar.style.transform = 'translateX(-50%) scaleX(1)';
        
        if (startY - endY > 30) {
            // Swipe up - go home
            document.getElementById('launchOverlay').classList.remove('active');
            document.getElementById('settingsPanel').classList.remove('open');
        }
    }, {passive: true});
}

function pcSwitchTab(tab) {
    document.querySelectorAll('.pc-sidebar-item').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
}

// Close app function
function closeApp() {
    document.getElementById('launchOverlay').classList.remove('active');
}

// Toggle settings
function toggleSettings() {
    const panel = document.getElementById('settingsPanel');
    if (panel) {
        panel.classList.toggle('open');
    }
}

// Toggle fullscreen for mobile
function toggleFullscreen() {
    isFullscreenMobile = !isFullscreenMobile;
    document.body.classList.toggle('fullscreen-mobile');
    document.getElementById('fullscreenToggle').classList.toggle('active');
}

// Render apps for mobile
function renderApps() {
    const grid = document.getElementById('appGrid');
    if (!grid) return;
    
    grid.innerHTML = '';
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
    grid.style.gap = '15px';
    
    apps.forEach((app, index) => {
        const item = document.createElement('div');
        item.className = 'app-item';
        item.style.cssText = 'display: flex; flex-direction: column; align-items: center; cursor: pointer;';
        item.innerHTML = `
            <div style="width: 60px; height: 60px; border-radius: 18px; background: linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, 20)}); display: flex; align-items: center; justify-content: center; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                ${app.icon}
            </div>
            <div style="color: white; font-size: 11px; text-align: center; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">${app.name}</div>
        `;
        item.onclick = () => launchApp(app);
        grid.appendChild(item);
    });
}

// Helper
function adjustColor(color, amount) {
    const num = parseInt(color.replace('#', ''), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + amount));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
    const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
    return `#${(0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1)}`;
}

// Apply translations
function applyLanguage() {
    const t = translations[currentLang];
    if (!t) return;
    
    const unlockText = document.querySelector('.unlock-text');
    if (unlockText) unlockText.textContent = t.unlock;
}
