<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SkyRom OS</title>

<style>

:root{
--glass:rgba(255,255,255,.08);
--blur:blur(40px);
--radius:28px;
--ease:cubic-bezier(.2,.9,.3,1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,system-ui;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(160deg,#0f172a,#020617);
color:white;
}

/* LOCKSCREEN */

.lockscreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:70px;
backdrop-filter:blur(20px);
z-index:100;
transition:.5s;
}

.unlock{
opacity:0;
pointer-events:none;
}

/* STATUS */

.status{
position:absolute;
top:6px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 15px;
font-size:14px;
}

/* ISLAND */

.island{
position:absolute;
top:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:30px;
background:black;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
transition:.35s var(--ease);
}

.island.active{
width:260px;
height:60px;
}

/* GRID */

.grid{
position:absolute;
top:70px;
width:100%;
display:grid;
grid-template-columns:repeat(4,1fr);
grid-auto-rows:95px;
gap:14px;
padding:10px 18px;
}

.tile{
background:var(--glass);
backdrop-filter:var(--blur);
border-radius:var(--radius);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
transition:.25s var(--ease);
}

.tile:hover{
transform:scale(1.06);
}

/* WIDGET */

.widget-large{
grid-column:span 2;
grid-row:span 2;
font-size:40px;
}

/* DOCK */

.dock{
position:absolute;
bottom:22px;
left:50%;
transform:translateX(-50%);
width:86%;
height:90px;
background:var(--glass);
backdrop-filter:var(--blur);
border-radius:40px;
display:flex;
align-items:center;
justify-content:space-around;
}

/* DOCK ZOOM */

.dock .tile:hover{
transform:scale(1.35);
}

/* APPS */

.app{
position:absolute;
top:50%;
left:50%;
width:90%;
height:84%;
background:rgba(0,0,0,.45);
backdrop-filter:blur(50px);
border-radius:35px;

transform:translate(-50%,-50%) scale(.82);
opacity:0;
transition:.35s var(--ease);
}

.app.active{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

/* CONTROL CENTER */

.control{
position:absolute;
top:-100%;
right:0;
width:100%;
height:50%;
background:rgba(0,0,0,.7);
backdrop-filter:blur(50px);
transition:.4s;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
}

.control.show{
top:0;
}

/* NOTIFICATION */

.notification{
position:absolute;
top:-120px;
left:50%;
transform:translateX(-50%);
background:black;
padding:14px 22px;
border-radius:20px;
transition:.4s;
}

.notification.show{
top:60px;
}

/* CHAT */

.chat{
height:70%;
overflow:auto;
padding:12px;
}

.msg{
background:#1e293b;
margin:6px;
padding:8px;
border-radius:10px;
}

/* GESTURE */

.gesture{
position:absolute;
bottom:6px;
width:100%;
display:flex;
justify-content:center;
}

.bar{
width:120px;
height:6px;
background:white;
border-radius:10px;
opacity:.6;
}

</style>
</head>

<body>

<!-- LOCKSCREEN -->

<div class="lockscreen" id="lock">
<div id="clock"></div>
<div style="font-size:14px">toca para desbloquear</div>
</div>

<!-- STATUS -->

<div class="status">
<div id="time"></div>
<div>📶 📡 🔋</div>
</div>

<div class="island" id="island">SkyRom</div>

<div class="notification" id="noti">Notificación</div>

<!-- CONTROL CENTER -->

<div class="control" id="control">

<div style="padding:20px;font-size:22px">
Control Center
</div>

<button onclick="notify('wifi activado')">WiFi</button>
<button onclick="notify('bluetooth activado')">Bluetooth</button>

</div>

<!-- GRID -->

<div class="grid">

<div class="tile widget-large">
<div id="bigclock"></div>
</div>

<div class="tile" onclick="openApp('ai')">🤖</div>
<div class="tile" onclick="openApp('store')">🛍</div>
<div class="tile">📷</div>
<div class="tile">🎵</div>
<div class="tile">🌐</div>

</div>

<!-- DOCK -->

<div class="dock">
<div class="tile">📞</div>
<div class="tile">💬</div>
<div class="tile">⚙️</div>
</div>

<!-- AI APP -->

<div class="app" id="ai">

<div style="padding:12px;font-weight:bold">
SkyAI
</div>

<div class="chat" id="chat"></div>

<input id="input">
<button onclick="send()">Enviar</button>

</div>

<!-- STORE -->

<div class="app" id="store">

<div style="padding:12px;font-weight:bold">
SkyStore
</div>

<button onclick="install('🎮')">instalar juego</button>
<button onclick="install('📷')">instalar cámara</button>

</div>

<div class="gesture" onclick="home()">
<div class="bar"></div>
</div>

<script>

/* CLOCK */

function clock(){

let d=new Date()

let t=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")

document.getElementById("clock").innerText=t
document.getElementById("bigclock").innerText=t
document.getElementById("time").innerText=t

}

setInterval(clock,1000)
clock()

/* UNLOCK */

document.getElementById("lock").onclick=()=>{
document.getElementById("lock").classList.add("unlock")
}

/* APPS */

function openApp(id){

document.querySelectorAll(".app").forEach(a=>a.classList.remove("active"))

document.getElementById(id).classList.add("active")

island("App abierta")

}

/* HOME */

function home(){
document.querySelectorAll(".app").forEach(a=>a.classList.remove("active"))
}

/* ISLAND */

function island(text){

let i=document.getElementById("island")

i.innerText=text

i.classList.add("active")

setTimeout(()=>{
i.classList.remove("active")
i.innerText="SkyRom"
},2000)

}

/* NOTIFICATION */

function notify(text){

let n=document.getElementById("noti")

n.innerText=text

n.classList.add("show")

setTimeout(()=>n.classList.remove("show"),3000)

}

/* AI */

function send(){

let input=document.getElementById("input")
let chat=document.getElementById("chat")

let user=document.createElement("div")
user.className="msg"
user.innerText=input.value
chat.appendChild(user)

let ai=document.createElement("div")
ai.className="msg"

ai.innerText="procesando..."

chat.appendChild(ai)

input.value=""

}

/* STORE */

function install(icon){

let grid=document.querySelector(".grid")

let app=document.createElement("div")

app.className="tile"
app.innerText=icon

grid.appendChild(app)

notify("app instalada")

}

/* CONTROL CENTER */

document.addEventListener("wheel",(e)=>{

if(e.deltaY<0){
document.getElementById("control").classList.add("show")
}

if(e.deltaY>0){
document.getElementById("control").classList.remove("show")
}

})

</script>

</body>
</html>
