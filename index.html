<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Mi Proyecto Web</title>
    
    <!-- Manifesto de la aplicación -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Configuración para dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <!-- Iconos -->
    <link rel="apple-touch-icon" sizes="256x256" href="assets/icon-256.png">
    <link rel="icon" sizes="256x256" href="assets/icon-256.png">
    <meta name="HandheldFriendly" content="true">

    <!-- Estilos personalizados -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #main-canvas {
            display: block;
            touch-action: none;
            -ms-touch-action: none;
        }
        
        .unsupported-message {
            text-align: center;
            padding: 20px;
            line-height: 1.6;
        }
        
        .unsupported-message a {
            color: #4fc3f7;
            text-decoration: none;
        }
        
        .unsupported-message a:hover {
            text-decoration: underline;
        }
    </style>
<base target="_blank">
</head>

<body>
    <!-- Contenedor principal del juego -->
    <div id="game-container">
        <canvas id="main-canvas" width="720" height="1280">
            <div class="unsupported-message">
                <h2>Tu navegador no soporta HTML5</h2>
                <p>Actualiza tu navegador para disfrutar de esta experiencia.</p>
                <p>
                    <a href="https://www.google.com/chrome/">Google Chrome</a> |
                    <a href="https://www.mozilla.org/firefox/">Mozilla Firefox</a> |
                    <a href="https://www.microsoft.com/edge">Microsoft Edge</a> |
                    <a href="https://www.apple.com/safari/">Apple Safari</a>
                </p>
            </div>
        </canvas>
    </div>

    <!-- Verificación de protocolo file:// -->
    <script>
        (function() {
            if (window.location.protocol.indexOf('file') === 0) {
                console.warn('Advertencia: Los archivos locales pueden tener limitaciones de seguridad.');
                alert('Este proyecto debe ejecutarse en un servidor web para funcionar correctamente.');
            }
        })();
    </script>

    <!-- Librerías necesarias -->
    <script src="libs/jquery.min.js"></script>
    <script src="core/engine.js"></script>

    <!-- Inicialización del proyecto -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Inicializar el motor del juego
            if (typeof GameEngine !== 'undefined') {
                GameEngine.init('main-canvas');
            } else {
                console.error('Error: No se pudo cargar el motor del juego');
            }
        });

        // Gestión de visibilidad de la página
        function handleVisibilityChange() {
            var isHidden = document.hidden || document.webkitHidden || document.msHidden;
            
            if (typeof GameEngine !== 'undefined' && GameEngine.setActive) {
                GameEngine.setActive(!isHidden);
            }
        }

        // Eventos de visibilidad
        if (document.hidden !== undefined) {
            document.addEventListener('visibilitychange', handleVisibilityChange);
        } else if (document.webkitHidden !== undefined) {
            document.addEventListener('webkitvisibilitychange', handleVisibilityChange);
        } else if (document.msHidden !== undefined) {
            document.addEventListener('msvisibilitychange', handleVisibilityChange);
        }

        // Registro del Service Worker para soporte offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js', { scope: './' })
                    .then(function(registration) {
                        console.log('Service Worker registrado:', registration.scope);
                    })
                    .catch(function(error) {
                        console.warn('Error al registrar Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
